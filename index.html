<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Programmiersprache - IDE</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-editor: #252526;
            --bg-sidebar: #333333;
            --accent: #007acc;
            --accent-hover: #0098ff;
            --text-light: #cccccc;
            --text-white: #ffffff;
            --border: #3e3e42;
            --console-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header / Toolbar */
        header {
            background-color: var(--bg-sidebar);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-weight: bold;
            color: var(--text-white);
            font-size: 1.1rem;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--accent);
            color: var(--text-white);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Main Workspace Layout */
        main {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
        }

        /* Editor Section */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .panel-header {
            background-color: var(--bg-sidebar);
            padding: 8px 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--bg-editor);
        }

        textarea#code-input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            color: var(--text-white);
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            tab-size: 4;
        }

        /* Right Panel: Console + Display */
        .right-pane {
            width: 500px;
            display: flex;
            flex-direction: column;
            background-color: var(--console-bg);
        }

        .console-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border);
            min-height: 150px;
        }

        #console-output {
            flex: 1;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #4ec9b0;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-error {
            color: #f14c4c;
        }

        .console-input-line {
            display: flex;
            align-items: center;
            color: #ce9178;
            margin-top: 5px;
        }

        .console-input-field {
            outline: none;
            color: #fff;
            caret-color: #0098ff;
            min-width: 10px;
            display: inline-block;
        }

        /* Display Container Section */
        .display-container {
            height: 535px;
            display: flex;
            flex-direction: column;
            background-color: #111;
            align-items: center;
        }

        .display-viewport {
            width: 500px;
            height: 500px;
            position: relative;
            background-color: #000;
        }

        #display-canvas {
            width: 500px;
            height: 500px;
            display: block;
            background-color: #000;
        }

        #display-frame {
            width: 500px;
            height: 500px;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            background-color: #fff;
        }

        @media (max-width: 900px) {
            main {
                flex-direction: column;
                overflow-y: auto;
            }
            .right-pane {
                width: 100%;
            }
            .display-container {
                height: auto;
                padding-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="title">MyLang Web Studio</div>
        <div class="actions">
            <button id="run-btn" onclick="runCompiler()">▶ Ausführen</button>
            <button id="clear-btn" style="background-color: #555;" onclick="clearConsole()">Löschen</button>
        </div>
    </header>

    <main>
        <section class="editor-container">
            <div class="panel-header">Quellcode</div>
            <div class="editor-wrapper">
                <textarea id="code-input" spellcheck="false" placeholder="Schreibe deinen Code hier...
Beispiel:
/input (&quot;Wie heisst du?&quot;) [$name]
/print (&quot;Hallo &quot; + [$name])

/@alter = (10 + 8)
/cast [@alter] $
/print (&quot;Dein Alter ist: &quot; + [$alter])"></textarea>
            </div>
        </section>

        <div class="right-pane">
            <section class="console-container">
                <div class="panel-header">Konsole / Ausgabe</div>
                <div id="console-output">
                    <div class="log-entry" style="color: #888;">// Bereit. Gib Code ein und klicke auf "Ausführen".</div>
                </div>
            </section>

            <section class="display-container">
                <div class="panel-header" style="width: 100%;">Display (500 x 500)</div>
                <div class="display-viewport">
                    <canvas id="display-canvas" width="500" height="500"></canvas>
                    <iframe id="display-frame"></iframe>
                </div>
            </section>
        </div>
    </main>

    <script>
        const codeInput = document.getElementById('code-input');
        codeInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;

                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        function logToConsole(message, isError = false) {
            const consoleOutput = document.getElementById('console-output');
            const entry = document.createElement('div');
            entry.className = isError ? 'log-entry log-error' : 'log-entry';
            entry.textContent = message;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
            resetDisplay();
        }

        const canvas = document.getElementById('display-canvas');
        const ctx = canvas.getContext('2d');
        const iframe = document.getElementById('display-frame');

        function resetDisplay() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, 500, 500);
            iframe.src = "about:blank";
            iframe.style.display = "none";
            canvas.style.display = "block";
        }

        resetDisplay();

        // Konsolen-Eingabe Handler für /input
        function promptUserConsole(promptText) {
            return new Promise((resolve) => {
                const consoleOutput = document.getElementById('console-output');
                
                // Prompt in der Konsole ausgeben
                logToConsole(promptText);

                // Eingabe-Zeile erstellen
                const inputLine = document.createElement('div');
                inputLine.className = 'console-input-line';
                inputLine.innerHTML = `>&nbsp;<span class="console-input-field" contenteditable="true"></span>`;
                consoleOutput.appendChild(inputLine);

                const inputSpan = inputLine.querySelector('.console-input-field');
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
                
                // Fokus auf das Eingabefeld setzen
                setTimeout(() => inputSpan.focus(), 10);

                inputSpan.addEventListener('keydown', function keyHandler(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const result = inputSpan.textContent.trim();
                        
                        // Eingabe fixieren
                        inputSpan.contentEditable = "false";
                        inputSpan.removeEventListener('keydown', keyHandler);

                        resolve(result);
                    }
                });
            });
        }

        // --- COMPILER ENGINE ---
        const globalVariables = {};
        const callStack = [];
        const functions = {};

        function getVariable(key) {
            for (let i = callStack.length - 1; i >= 0; i--) {
                if (callStack[i].hasOwnProperty(key)) {
                    return callStack[i][key];
                }
            }
            if (globalVariables.hasOwnProperty(key)) {
                return globalVariables[key];
            }
            return undefined;
        }

        function setVariable(key, value) {
            for (let i = callStack.length - 1; i >= 0; i--) {
                if (callStack[i].hasOwnProperty(key)) {
                    callStack[i][key] = value;
                    return;
                }
            }
            globalVariables[key] = value;
        }

        function deleteVariable(key) {
            for (let i = callStack.length - 1; i >= 0; i--) {
                if (callStack[i].hasOwnProperty(key)) {
                    delete callStack[i][key];
                    return;
                }
            }
            delete globalVariables[key];
        }

        function hasVariable(key) {
            return getVariable(key) !== undefined;
        }

        async function runCompiler() {
            const code = codeInput.value;
            if (!code.trim()) {
                logToConsole("[Warnung] Kein Code zum Ausführen vorhanden.", true);
                return;
            }

            clearConsole();
            
            for (let key in globalVariables) delete globalVariables[key];
            for (let key in functions) delete functions[key];
            callStack.length = 0;

            const lines = code.split('\n');
            await executeBlock(lines, 0, lines.length);
        }

        function resolveVariablesInString(str, lineNum) {
            return str.replace(/\[\s*(.*?)\s*\]/g, (match, content) => {
                const trimmed = content.trim();

                if (/^[$@?]/.test(trimmed)) {
                    const val = getVariable(trimmed);
                    if (val !== undefined) {
                        return val;
                    } else {
                        logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable [${trimmed}] ist nicht definiert.`, true);
                        return match;
                    }
                }

                return trimmed;
            });
        }

        function evaluateMathExpression(expr, lineNum) {
            let resolved = resolveVariablesInString(expr, lineNum);

            if (!/^[0-9. +\-*/()]+$/.test(resolved)) {
                return null;
            }

            try {
                return Function(`'use strict'; return (${resolved})`)();
            } catch (e) {
                return null;
            }
        }

        async function executeBlock(lines, startLine, endLine) {
            let i = startLine;

            while (i < endLine) {
                const lineNum = i + 1;
                const rawLine = lines[i];
                const line = rawLine.trim();

                if (line === '' || line === '}') {
                    i++;
                    continue;
                }

                // 1. Deklaration einer Funktion: /func [name] <$param1, @param2> {
                if (line.startsWith('/func')) {
                    const funcRegex = /^\/func\s+\[\s*([a-zA-Z0-9_]+)\s*\]\s*(?:<(.*?)>)?\s*:\s*\{?$/;
                    const altFuncRegex = /^\/func\s+\[\s*([a-zA-Z0-9_]+)\s*\]\s*(?:<(.*?)>)?\s*\{?$/;
                    
                    const match = line.match(funcRegex) || line.match(altFuncRegex);
                    if (!match) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültige /func Syntax: "${line}"`, true);
                        return false;
                    }

                    const funcName = match[1];
                    const rawParams = match[2] ? match[2].split(',').map(p => p.trim()).filter(p => p.length > 0) : [];

                    let blockEndIndex = findClosingBracket(lines, i);
                    if (blockEndIndex === -1) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Fehlende schließende Klammer '}' für /func Block.`, true);
                        return false;
                    }

                    functions[funcName] = {
                        params: rawParams,
                        startLine: i + 1,
                        endLine: blockEndIndex
                    };

                    i = blockEndIndex + 1;
                    continue;
                }

                // 2. Kontrollstruktur /repeat
                if (line.startsWith('/repeat')) {
                    const repeatHeaderRegex = /^\/repeat\s*\((.*?)\)\s*:\s*\{?$/;
                    const match = line.match(repeatHeaderRegex);

                    if (!match) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültiges /repeat Format: "${line}"`, true);
                        return false;
                    }

                    let rawCountParam = match[1].trim();
                    let evaluatedCount = evaluateMathExpression(rawCountParam, lineNum);
                    const repeatCount = evaluatedCount !== null ? Number(evaluatedCount) : Number(resolveVariablesInString(rawCountParam, lineNum));

                    if (isNaN(repeatCount) || repeatCount < 0) {
                        logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Ungültige Wiederholungsanzahl in /repeat: "${rawCountParam}"`, true);
                        return false;
                    }

                    let blockEndIndex = findClosingBracket(lines, i);
                    if (blockEndIndex === -1) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Fehlende schließende Klammer '}' für /repeat Block.`, true);
                        return false;
                    }

                    for (let r = 0; r < repeatCount; r++) {
                        const success = await executeBlock(lines, i + 1, blockEndIndex);
                        if (!success) return false;
                    }

                    i = blockEndIndex + 1;
                    continue;
                }

                // 3. Kontrollstruktur /if
                if (line.startsWith('/if')) {
                    let executedBranch = false;
                    let currentIdx = i;

                    while (currentIdx < endLine) {
                        const curLine = lines[currentIdx].trim();

                        const ifMatch = curLine.match(/^(\/if|ifelse)\s*\((.*?)\)\s*:\s*\{?$/);
                        const elseMatch = curLine.match(/^else\s*:\s*\{?$/);

                        if (!ifMatch && !elseMatch) {
                            break;
                        }

                        let blockEndIndex = findClosingBracket(lines, currentIdx);
                        if (blockEndIndex === -1) {
                            logToConsole(`SyntaxFehler (Zeile ${currentIdx + 1}): Fehlende schließende Klammer '}' für Block.`, true);
                            return false;
                        }

                        if (ifMatch) {
                            const conditionStr = resolveVariablesInString(ifMatch[2].trim(), currentIdx + 1);

                            if (!executedBranch) {
                                const conditionResult = evaluateCondition(conditionStr, currentIdx + 1);
                                if (conditionResult === null) return false;

                                if (conditionResult === true) {
                                    const success = await executeBlock(lines, currentIdx + 1, blockEndIndex);
                                    if (!success) return false;
                                    executedBranch = true;
                                }
                            }
                        } else if (elseMatch) {
                            if (!executedBranch) {
                                const success = await executeBlock(lines, currentIdx + 1, blockEndIndex);
                                if (!success) return false;
                                executedBranch = true;
                            }
                        }

                        currentIdx = blockEndIndex + 1;
                        while (currentIdx < endLine && lines[currentIdx].trim() === '') {
                            currentIdx++;
                        }

                        if (currentIdx >= endLine) break;

                        const nextLine = lines[currentIdx].trim();
                        if (!nextLine.startsWith('ifelse') && !nextLine.startsWith('else')) {
                            break;
                        }
                    }

                    i = currentIdx;
                    continue;
                }

                // 4. Aufruf einer Funktion: name (arg1, arg2)
                const funcCallMatch = line.match(/^([a-zA-Z0-9_]+)\s*\((.*)\)$/);
                if (funcCallMatch && !line.startsWith('/')) {
                    const funcName = funcCallMatch[1];
                    if (functions.hasOwnProperty(funcName)) {
                        const rawArgs = funcCallMatch[2].trim();
                        const success = await invokeFunction(funcName, rawArgs, lines, lineNum);
                        if (!success) return false;
                        i++;
                        continue;
                    }
                }

                if (!line.startsWith('/')) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Befehl muss mit '/' beginnen oder ein gültiger Funktionsaufruf sein: "${line}"`, true);
                    return false;
                }

                const success = await executeCommand(line, lineNum);
                if (!success) return false;

                i++;
            }
            return true;
        }

        async function invokeFunction(funcName, rawArgsStr, lines, lineNum) {
            const func = functions[funcName];
            
            let parsedArgs = [];
            if (rawArgsStr.length > 0) {
                const rawArgsList = rawArgsStr.split(',').map(a => a.trim());
                for (let arg of rawArgsList) {
                    let val = evaluateMathExpression(arg, lineNum);
                    if (val === null) {
                        const resolved = resolveVariablesInString(arg, lineNum);
                        val = parseOperand(resolved, lineNum);
                    }
                    parsedArgs.push(val);
                }
            }

            if (parsedArgs.length !== func.params.length) {
                logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Funktion '${funcName}' erwartet ${func.params.length} Parameter, aber ${parsedArgs.length} wurden übergeben.`, true);
                return false;
            }

            const localScope = {};
            for (let p = 0; p < func.params.length; p++) {
                localScope[func.params[p]] = parsedArgs[p];
            }

            callStack.push(localScope);
            const success = await executeBlock(lines, func.startLine, func.endLine);
            callStack.pop();

            return success;
        }

        function findClosingBracket(lines, startIdx) {
            let openBrackets = 0;
            for (let j = startIdx; j < lines.length; j++) {
                if (lines[j].includes('{')) openBrackets++;
                if (lines[j].includes('}')) {
                    openBrackets--;
                    if (openBrackets === 0) {
                        return j;
                    }
                }
            }
            return -1;
        }

        function evaluateCondition(cond, lineNum) {
            const opMatch = cond.match(/(<=|>=|!=|=|>=|<=|>|<)/);

            if (opMatch) {
                const operator = opMatch[1];
                const parts = cond.split(operator);
                let leftVal = evaluateMathExpression(parts[0].trim(), lineNum);
                if (leftVal === null) leftVal = parseOperand(parts[0].trim(), lineNum);

                let rightVal = evaluateMathExpression(parts[1].trim(), lineNum);
                if (rightVal === null) rightVal = parseOperand(parts[1].trim(), lineNum);

                if (leftVal === null || rightVal === null) return null;

                switch (operator) {
                    case '=':  return leftVal === rightVal;
                    case '!=': return leftVal !== rightVal;
                    case '>':  return leftVal > rightVal;
                    case '<':  return leftVal < rightVal;
                    case '>=': return leftVal >= rightVal;
                    case '<=': return leftVal <= rightVal;
                }
            } else {
                let val = evaluateMathExpression(cond, lineNum);
                if (val === null) val = parseOperand(cond, lineNum);
                if (val === null) return null;
                return Boolean(val);
            }
        }

        function parseOperand(token, lineNum) {
            if (token.startsWith('?') || token.startsWith('@') || token.startsWith('$')) {
                const val = getVariable(token);
                if (val !== undefined) {
                    return val;
                } else {
                    logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable ${token} ist nicht definiert.`, true);
                    return null;
                }
            }
            if (!isNaN(Number(token))) {
                return Number(token);
            }
            const strMatch = token.match(/^["'](.*)["']$/);
            if (strMatch) {
                return strMatch[1];
            }
            if (token === 'true') return true;
            if (token === 'false') return false;

            return token;
        }

        async function executeCommand(line, lineNum) {
            // 1. Wait Befehl
            if (line.startsWith('/wait')) {
                const waitMatch = line.match(/^\/wait\s*\((.*)\)$/);
                if (!waitMatch) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültige /wait Syntax. Beispiel: /wait (1s) oder /wait (frame)`, true);
                    return false;
                }

                let param = waitMatch[1].trim();
                let mathVal = evaluateMathExpression(param, lineNum);
                if (mathVal !== null) {
                    param = String(mathVal) + 's';
                } else {
                    param = resolveVariablesInString(param, lineNum);
                }

                let ms = 0;
                if (param.toLowerCase() === 'frame') {
                    ms = 1000 / 30;
                } else {
                    const timeMatch = param.match(/^([0-9.]+)\s*(ms|s|m|h)?$/i);
                    if (!timeMatch) {
                        logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Ungültiges Zeitformat in /wait: "${param}"`, true);
                        return false;
                    }

                    const val = parseFloat(timeMatch[1]);
                    const unit = (timeMatch[2] || 's').toLowerCase();

                    if (unit === 'ms') ms = val;
                    else if (unit === 's') ms = val * 1000;
                    else if (unit === 'm') ms = val * 60 * 1000;
                    else if (unit === 'h') ms = val * 60 * 60 * 1000;
                }

                await new Promise(resolve => setTimeout(resolve, ms));
                return true;
            }

            // 2. Input Befehl direkt in der Konsole: /input ("Prompt") [$variable]
            if (line.startsWith('/input')) {
                const inputMatch = line.match(/^\/input\s*\(\s*(["'])(.*?)\1\s*\)\s*\[\s*([$@?][a-zA-Z0-9_]+)\s*\]$/);
                if (!inputMatch) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültige /input Syntax. Beispiel: /input ("Wie heisst du?") [$name]`, true);
                    return false;
                }

                const promptMsg = resolveVariablesInString(inputMatch[2], lineNum);
                const varTarget = inputMatch[3].trim();

                const userInput = await promptUserConsole(promptMsg);
                setVariable(varTarget, userInput);
                return true;
            }

            // 3. Cast Befehl: /cast [$/@/?variablenname] @/$/?
            if (line.startsWith('/cast')) {
                const castMatch = line.match(/^\/cast\s+\[\s*([$@?][a-zA-Z0-9_]+)\s*\]\s*([$@?])$/);
                if (!castMatch) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültige /cast Syntax. Beispiel: /cast [$name] @ oder /cast [@zahl] $`, true);
                    return false;
                }

                const srcVar = castMatch[1];
                const targetType = castMatch[2];

                if (!hasVariable(srcVar)) {
                    logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable ${srcVar} ist nicht definiert.`, true);
                    return false;
                }

                const currentVal = getVariable(srcVar);
                const rawName = srcVar.substring(1);
                const newVarKey = targetType + rawName;

                let convertedValue;
                if (targetType === '@') {
                    convertedValue = Number(currentVal);
                    if (isNaN(convertedValue)) convertedValue = 0;
                } else if (targetType === '$') {
                    convertedValue = String(currentVal);
                } else if (targetType === '?') {
                    convertedValue = Boolean(currentVal) && currentVal !== "false" && currentVal !== "0";
                }

                deleteVariable(srcVar);
                setVariable(newVarKey, convertedValue);
                return true;
            }

            // 4. Variable Modifikation
            const opMatch = line.match(/^\/([$@?])([a-zA-Z0-9_]+)\s*(\+=|-=|\*=|\/=|=)\s*(.+)$/);

            if (opMatch) {
                const typeSymbol = opMatch[1];
                const varName = opMatch[2];
                const operator = opMatch[3];
                let rawValue = opMatch[4].trim();
                const fullVarKey = typeSymbol + varName;

                if (operator !== '=' && !hasVariable(fullVarKey)) {
                    logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable ${fullVarKey} existiert nicht.`, true);
                    return false;
                }

                let mathVal = evaluateMathExpression(rawValue, lineNum);

                if (typeSymbol === '@') {
                    let operandValue = mathVal !== null ? mathVal : parseOperand(resolveVariablesInString(rawValue, lineNum), lineNum);
                    if (operandValue === null || isNaN(Number(operandValue))) {
                        logToConsole(`TypFehler (Zeile ${lineNum}): Ungültige Zahl für Operation mit @${varName}: "${rawValue}"`, true);
                        return false;
                    }
                    operandValue = Number(operandValue);

                    if (operator === '=') setVariable(fullVarKey, operandValue);
                    else if (operator === '+=') setVariable(fullVarKey, getVariable(fullVarKey) + operandValue);
                    else if (operator === '-=') setVariable(fullVarKey, getVariable(fullVarKey) - operandValue);
                    else if (operator === '*=') setVariable(fullVarKey, getVariable(fullVarKey) * operandValue);
                    else if (operator === '/=') {
                        if (operandValue === 0) {
                            logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Division durch Null.`, true);
                            return false;
                        }
                        setVariable(fullVarKey, getVariable(fullVarKey) / operandValue);
                    }
                } 
                else if (typeSymbol === '$') {
                    let stringVal = mathVal !== null ? String(mathVal) : resolveVariablesInString(rawValue, lineNum);
                    const stringMatch = stringVal.match(/^["'](.*)["']$/);
                    if (stringMatch) stringVal = stringMatch[1];

                    if (operator === '=') setVariable(fullVarKey, stringVal);
                    else if (operator === '+=') setVariable(fullVarKey, getVariable(fullVarKey) + stringVal);
                } 
                else if (typeSymbol === '?') {
                    if (rawValue === 'true' || rawValue === '1') setVariable(fullVarKey, true);
                    else if (rawValue === 'false' || rawValue === '0') setVariable(fullVarKey, false);
                }
                return true;
            }

            // 5. Print
            if (line.startsWith('/print')) {
                const printContentRegex = /^\/print\s*\((.*)\)$/;
                const printMatch = line.match(printContentRegex);

                if (!printMatch) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültige /print Syntax.`, true);
                    return false;
                }

                let inner = printMatch[1].trim();
                let mathVal = evaluateMathExpression(inner, lineNum);
                let content = mathVal !== null ? String(mathVal) : resolveVariablesInString(inner, lineNum);

                const stringMatch = content.match(/^["'](.*)["']$/);
                if (stringMatch) content = stringMatch[1];

                logToConsole(content);
                return true;
            }

            // 6. Display commands
            if (line.startsWith('/display')) {
                const webMatch = line.match(/^\/display\s+-web\s*\(\s*(["'])(.*?)\1\s*\)$/);
                if (webMatch) {
                    const url = resolveVariablesInString(webMatch[2], lineNum);
                    canvas.style.display = "none";
                    iframe.style.display = "block";
                    iframe.src = url;
                    return true;
                }

                const pixelMatch = line.match(/^\/display\s+-pixel\s*\(\s*(.*?)\s*,\s*(.*?)\s*\)\s*(.+)$/);
                if (pixelMatch) {
                    let rawX = pixelMatch[1].trim();
                    let rawY = pixelMatch[2].trim();

                    let xVal = evaluateMathExpression(rawX, lineNum);
                    if (xVal === null) xVal = parseOperand(resolveVariablesInString(rawX, lineNum), lineNum);

                    let yVal = evaluateMathExpression(rawY, lineNum);
                    if (yVal === null) yVal = parseOperand(resolveVariablesInString(rawY, lineNum), lineNum);

                    let colorRaw = resolveVariablesInString(pixelMatch[3].trim(), lineNum);

                    if (xVal === null || yVal === null) return false;

                    let hexColor = colorRaw;
                    if (colorRaw.startsWith('$') || colorRaw.startsWith('@')) {
                        hexColor = parseOperand(colorRaw, lineNum);
                    } else if (colorRaw.startsWith('"') || colorRaw.startsWith("'")) {
                        const matchStr = colorRaw.match(/^["'](.*)["']$/);
                        if (matchStr) hexColor = matchStr[1];
                    }

                    iframe.style.display = "none";
                    canvas.style.display = "block";

                    ctx.fillStyle = hexColor;
                    ctx.fillRect(Math.floor(xVal), Math.floor(yVal), 1, 1);
                    return true;
                }

                logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültige /display Syntax.`, true);
                return false;
            }

            logToConsole(`SyntaxFehler (Zeile ${lineNum}): Unbekannter Befehl: "${line}"`, true);
            return false;
        }
    </script>
</body>
