<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Programmiersprache - IDE</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-editor: #252526;
            --bg-sidebar: #333333;
            --accent: #007acc;
            --accent-hover: #0098ff;
            --text-light: #cccccc;
            --text-white: #ffffff;
            --border: #3e3e42;
            --console-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header / Toolbar */
        header {
            background-color: var(--bg-sidebar);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-weight: bold;
            color: var(--text-white);
            font-size: 1.1rem;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--accent);
            color: var(--text-white);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Main Workspace Layout */
        main {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
        }

        /* Editor Section */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .panel-header {
            background-color: var(--bg-sidebar);
            padding: 8px 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--bg-editor);
        }

        textarea#code-input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            color: var(--text-white);
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            tab-size: 4;
        }

        /* Console Output Section */
        .console-container {
            width: 40%;
            display: flex;
            flex-direction: column;
            background-color: var(--console-bg);
        }

        #console-output {
            flex: 1;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #4ec9b0;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-error {
            color: #f14c4c;
        }

        /* Responsive Layout für kleine Bildschirme / Mobilgeräte */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }
            .console-container {
                width: 100%;
                height: 40%;
                border-top: 1px solid var(--border);
            }
            .editor-container {
                border-right: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="title">MyLang Web Studio</div>
        <div class="actions">
            <button id="run-btn" onclick="runCompiler()">▶ Ausführen</button>
            <button id="clear-btn" style="background-color: #555;" onclick="clearConsole()">Löschen</button>
        </div>
    </header>

    <main>
        <!-- Code Editor Pane -->
        <section class="editor-container">
            <div class="panel-header">Quellcode</div>
            <div class="editor-wrapper">
                <textarea id="code-input" spellcheck="false" placeholder="Schreibe deinen Code hier...
Beispiel:
/#Zahl = 5
/?Aktiv = true

/if (?Aktiv): {
    /print(&quot;System ist aktiv!&quot;)
}

/if (#Zahl > 3): {
    /print(&quot;Zahl ist grösser als 3&quot;)
}"></textarea>
            </div>
        </section>

        <!-- Output Pane -->
        <section class="console-container">
            <div class="panel-header">Konsole / Ausgabe</div>
            <div id="console-output">
                <div class="log-entry" style="color: #888;">// Bereit. Gib Code ein und klicke auf "Ausführen".</div>
            </div>
        </section>
    </main>

    <script>
        // Tab-Taste im Editor abfangen für saubere Einrückung
        const codeInput = document.getElementById('code-input');
        codeInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;

                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        // Konsolen-Hilfsfunktionen
        function logToConsole(message, isError = false) {
            const consoleOutput = document.getElementById('console-output');
            const entry = document.createElement('div');
            entry.className = isError ? 'log-entry log-error' : 'log-entry';
            entry.textContent = message;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
        }

        // --- COMPILER ENGINE ---

        // Speicher für Variablen
        const variables = {};

        function runCompiler() {
            const code = codeInput.value;
            if (!code.trim()) {
                logToConsole("[Warnung] Kein Code zum Ausführen vorhanden.", true);
                return;
            }

            clearConsole();
            
            // Speicher bei jedem Durchlauf zurücksetzen
            for (let key in variables) delete variables[key];

            const lines = code.split('\n');
            executeBlock(lines, 0, lines.length);
        }

        // Block-Ausführung zur Handhabung von Kontrollstrukturen wie /if
        function executeBlock(lines, startLine, endLine) {
            let i = startLine;

            while (i < endLine) {
                const lineNum = i + 1;
                const rawLine = lines[i];
                const line = rawLine.trim();

                // Leere Zeilen überspringen
                if (line === '' || line === '}') {
                    i++;
                    continue;
                }

                // Syntax-Prüfung: Befehle MÜSSEN mit '/' beginnen
                if (!line.startsWith('/')) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Befehl muss mit '/' beginnen: "${line}"`, true);
                    return false;
                }

                // PRÜFUNG: Ist es ein /if-Befehl?
                if (line.startsWith('/if')) {
                    const ifHeaderRegex = /^\/if\s*\((.*?)\)\s*:\s*\{?$/;
                    const match = line.match(ifHeaderRegex);

                    if (!match) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültiges /if Format: "${line}"`, true);
                        return false;
                    }

                    const conditionStr = match[1].trim();

                    // Block-Ende (schließende Klammer '}') finden
                    let blockEndIndex = -1;
                    let openBrackets = 0;

                    for (let j = i; j < lines.length; j++) {
                        if (lines[j].includes('{')) openBrackets++;
                        if (lines[j].includes('}')) {
                            openBrackets--;
                            if (openBrackets === 0) {
                                blockEndIndex = j;
                                break;
                            }
                        }
                    }

                    if (blockEndIndex === -1) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Fehlende schliessende Klammer '}' für /if Block.`, true);
                        return false;
                    }

                    // Bedingung auswerten
                    const conditionResult = evaluateCondition(conditionStr, lineNum);
                    if (conditionResult === null) return false; // Fehler bei der Bedingung

                    if (conditionResult === true) {
                        // Befehle innerhalb des /if-Blocks ausführen
                        const success = executeBlock(lines, i + 1, blockEndIndex);
                        if (!success) return false;
                    }

                    // Springe hinter den /if-Block
                    i = blockEndIndex + 1;
                    continue;
                }

                // Einzelnen Befehl verarbeiten
                const success = executeCommand(line, lineNum);
                if (!success) return false;

                i++;
            }
            return true;
        }

        // Hilfsfunktion zum Evaluieren von Bedingungen
        function evaluateCondition(cond, lineNum) {
            // Operator ermitteln (<=, >=, !=, =, >, <)
            const opMatch = cond.match(/(<=|>=|!=|=|>=|<=|>|<)/);

            if (opMatch) {
                const operator = opMatch[1];
                const parts = cond.split(operator);
                const leftVal = parseOperand(parts[0].trim(), lineNum);
                const rightVal = parseOperand(parts[1].trim(), lineNum);

                if (leftVal === null || rightVal === null) return null;

                switch (operator) {
                    case '=':  return leftVal === rightVal;
                    case '!=': return leftVal !== rightVal;
                    case '>':  return leftVal > rightVal;
                    case '<':  return leftVal < rightVal;
                    case '>=': return leftVal >= rightVal;
                    case '<=': return leftVal <= rightVal;
                }
            } else {
                // Einzelne Variable als Bedingung z.B. (?Aktiv)
                const val = parseOperand(cond, lineNum);
                if (val === null) return null;
                return Boolean(val);
            }
        }

        // Hilfsfunktion zum Auflösen von Operanden (Variablen oder Werte)
        function parseOperand(token, lineNum) {
            // 1. Variable z. B. ?Aktiv, #Zahl, $Name
            if (token.startsWith('?') || token.startsWith('#') || token.startsWith('$')) {
                if (variables.hasOwnProperty(token)) {
                    return variables[token];
                } else {
                    logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable ${token} ist nicht definiert.`, true);
                    return null;
                }
            }
            // 2. Zahlen-Literal
            if (!isNaN(Number(token))) {
                return Number(token);
            }
            // 3. String-Literal
            const strMatch = token.match(/^["'](.*)["']$/);
            if (strMatch) {
                return strMatch[1];
            }
            // 4. Boolean-Literal
            if (token === 'true') return true;
            if (token === 'false') return false;

            logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültiger Wert oder Operand: "${token}"`, true);
            return null;
        }

        function executeCommand(line, lineNum) {
            // 1. Zuweisung von Variablen: /$Var = "Text", /#Var = 123, /?Var = true
            const varAssignRegex = /^\/([$#?])([a-zA-Z0-9_]+)\s*=\s*(.+)$/;
            const varMatch = line.match(varAssignRegex);

            if (varMatch) {
                const typeSymbol = varMatch[1];
                const varName = varMatch[2];
                const rawValue = varMatch[3].trim();
                const fullVarKey = typeSymbol + varName;

                if (typeSymbol === '$') {
                    // String Zuweisung
                    const stringMatch = rawValue.match(/^["'](.*)["']$/);
                    if (!stringMatch) {
                        logToConsole(`TypFehler (Zeile ${lineNum}): Text-Variable $${varName} erwartet Anführungszeichen.`, true);
                        return false;
                    }
                    variables[fullVarKey] = stringMatch[1];
                } 
                else if (typeSymbol === '#') {
                    // Number Zuweisung (Ganzzahl oder Kommazahl)
                    const numValue = Number(rawValue);
                    if (isNaN(numValue)) {
                        logToConsole(`TypFehler (Zeile ${lineNum}): Ungültige Zahl für #${varName}: "${rawValue}"`, true);
                        return false;
                    }
                    variables[fullVarKey] = numValue;
                } 
                else if (typeSymbol === '?') {
                    // Boolean Zuweisung
                    if (rawValue === 'true' || rawValue === '1') {
                        variables[fullVarKey] = true;
                    } else if (rawValue === 'false' || rawValue === '0') {
                        variables[fullVarKey] = false;
                    } else {
                        logToConsole(`TypFehler (Zeile ${lineNum}): Boolean-Variable ?${varName} muss true oder false sein.`, true);
                        return false;
                    }
                }
                return true;
            }

            // 2. /print Befehl
            if (line.startsWith('/print')) {
                const printContentRegex = /^\/print\s*\((.*)\)$/;
                const printMatch = line.match(printContentRegex);

                if (!printMatch) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültiges /print Syntax.`, true);
                    return false;
                }

                const content = printMatch[1].trim();
                let result = "";

                // Tokens innerhalb von /print zerlegen (Strings in "" oder Variables in [...])
                const tokenRegex = /(["'])(.*?)\1|\[\s*([$#?][a-zA-Z0-9_]+)\s*\]/g;
                let match;

                while ((match = tokenRegex.exec(content)) !== null) {
                    if (match[2] !== undefined) {
                        // String-Literale
                        result += match[2];
                    } else if (match[3] !== undefined) {
                        // Variablenaufruf z.B. [$Name] oder [#Zahl]
                        const varKey = match[3];
                        if (variables.hasOwnProperty(varKey)) {
                            result += variables[varKey];
                        } else {
                            logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable [${varKey}] ist nicht definiert.`, true);
                            return false;
                        }
                    }
                }

                logToConsole(result);
                return true;
            }

            logToConsole(`SyntaxFehler (Zeile ${lineNum}): Unbekannter oder fehlerhafter Befehl: "${line}"`, true);
            return false;
        }
    </script>

</body>
</html>
