<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Programmiersprache - IDE</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-editor: #252526;
            --bg-sidebar: #333333;
            --accent: #007acc;
            --accent-hover: #0098ff;
            --text-light: #cccccc;
            --text-white: #ffffff;
            --border: #3e3e42;
            --console-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header / Toolbar */
        header {
            background-color: var(--bg-sidebar);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-weight: bold;
            color: var(--text-white);
            font-size: 1.1rem;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--accent);
            color: var(--text-white);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Main Workspace Layout */
        main {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
        }

        /* Editor Section */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .panel-header {
            background-color: var(--bg-sidebar);
            padding: 8px 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--bg-editor);
        }

        textarea#code-input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            color: var(--text-white);
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            tab-size: 4;
        }

        /* Right Panel: Console + Display */
        .right-pane {
            width: 500px;
            display: flex;
            flex-direction: column;
            background-color: var(--console-bg);
        }

        .console-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border);
            min-height: 150px;
        }

        #console-output {
            flex: 1;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #4ec9b0;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-error {
            color: #f14c4c;
        }

        /* Display Container Section */
        .display-container {
            height: 535px;
            display: flex;
            flex-direction: column;
            background-color: #111;
            align-items: center;
        }

        .display-viewport {
            width: 500px;
            height: 500px;
            position: relative;
            background-color: #000;
        }

        #display-canvas {
            width: 500px;
            height: 500px;
            display: block;
            background-color: #000;
        }

        #display-frame {
            width: 500px;
            height: 500px;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            background-color: #fff;
        }

        /* Responsive Layout für kleine Bildschirme / Mobilgeräte */
        @media (max-width: 900px) {
            main {
                flex-direction: column;
                overflow-y: auto;
            }
            .right-pane {
                width: 100%;
            }
            .display-container {
                height: auto;
                padding-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="title">MyLang Web Studio</div>
        <div class="actions">
            <button id="run-btn" onclick="runCompiler()">▶ Ausführen</button>
            <button id="clear-btn" style="background-color: #555;" onclick="clearConsole()">Löschen</button>
        </div>
    </header>

    <main>
        <!-- Code Editor Pane -->
        <section class="editor-container">
            <div class="panel-header">Quellcode</div>
            <div class="editor-wrapper">
                <textarea id="code-input" spellcheck="false" placeholder="Schreibe deinen Code hier...
Beispiel:
/@X = 1
/display -pixel ([@X], [@X]) [#ffffff]"></textarea>
            </div>
        </section>

        <!-- Right Side: Console + Display Viewport -->
        <div class="right-pane">
            <!-- Console Output Section -->
            <section class="console-container">
                <div class="panel-header">Konsole / Ausgabe</div>
                <div id="console-output">
                    <div class="log-entry" style="color: #888;">// Bereit. Gib Code ein und klicke auf "Ausführen".</div>
                </div>
            </section>

            <!-- Display Screen Section -->
            <section class="display-container">
                <div class="panel-header" style="width: 100%;">Display (500 x 500)</div>
                <div class="display-viewport">
                    <canvas id="display-canvas" width="500" height="500"></canvas>
                    <iframe id="display-frame"></iframe>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Tab-Taste im Editor abfangen für saubere Einrückung
        const codeInput = document.getElementById('code-input');
        codeInput.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;

                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        // Konsolen-Hilfsfunktionen
        function logToConsole(message, isError = false) {
            const consoleOutput = document.getElementById('console-output');
            const entry = document.createElement('div');
            entry.className = isError ? 'log-entry log-error' : 'log-entry';
            entry.textContent = message;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
            resetDisplay();
        }

        // Display-Hilfsfunktionen
        const canvas = document.getElementById('display-canvas');
        const ctx = canvas.getContext('2d');
        const iframe = document.getElementById('display-frame');

        function resetDisplay() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, 500, 500);
            iframe.src = "about:blank";
            iframe.style.display = "none";
            canvas.style.display = "block";
        }

        // Canvas initialisieren
        resetDisplay();

        // --- COMPILER ENGINE ---

        // Speicher für Variablen
        const variables = {};

        function runCompiler() {
            const code = codeInput.value;
            if (!code.trim()) {
                logToConsole("[Warnung] Kein Code zum Ausführen vorhanden.", true);
                return;
            }

            clearConsole();
            
            // Speicher bei jedem Durchlauf zurücksetzen
            for (let key in variables) delete variables[key];

            const lines = code.split('\n');
            executeBlock(lines, 0, lines.length);
        }

        // Ersetzt [Var] durch Werte, erlaubt aber rohe Werte wie Hex-Codes [#ffffff]
        function resolveVariablesInString(str, lineNum) {
            return str.replace(/\[\s*(.*?)\s*\]/g, (match, content) => {
                const trimmed = content.trim();

                // Nur wenn der Inhalt in [...] mit $, @ oder ? beginnt, werten wir es als Variable aus
                if (/^[$@?]/.test(trimmed)) {
                    if (variables.hasOwnProperty(trimmed)) {
                        return variables[trimmed];
                    } else {
                        logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable [${trimmed}] ist nicht definiert.`, true);
                        return match;
                    }
                }

                // Ansonsten ist es ein gewöhnlicher Wert (wie ein Hex-Code #ffffff)
                return trimmed;
            });
        }

        // Block-Ausführung zur Handhabung von Kontrollstrukturen wie /if, /repeat etc.
        function executeBlock(lines, startLine, endLine) {
            let i = startLine;

            while (i < endLine) {
                const lineNum = i + 1;
                const rawLine = lines[i];
                const line = rawLine.trim();

                // Leere Zeilen überspringen
                if (line === '') {
                    i++;
                    continue;
                }

                // PRÜFUNG: Ist es ein /repeat-Befehl?
                if (line.startsWith('/repeat')) {
                    const repeatHeaderRegex = /^\/repeat\s*\((.*?)\)\s*:\s*\{?$/;
                    const match = line.match(repeatHeaderRegex);

                    if (!match) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Ungültiges /repeat Format: "${line}"`, true);
                        return false;
                    }

                    let rawCountParam = match[1].trim();
                    rawCountParam = resolveVariablesInString(rawCountParam, lineNum);
                    const repeatCount = Number(rawCountParam);

                    if (isNaN(repeatCount) || repeatCount < 0) {
                        logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Ungültige Wiederholungsanzahl in /repeat: "${rawCountParam}"`, true);
                        return false;
                    }

                    let blockEndIndex = findClosingBracket(lines, i);
                    if (blockEndIndex === -1) {
                        logToConsole(`SyntaxFehler (Zeile ${lineNum}): Fehlende schliessende Klammer '}' für /repeat Block.`, true);
                        return false;
                    }

                    // Loop ausführen
                    for (let r = 0; r < repeatCount; r++) {
                        const success = executeBlock(lines, i + 1, blockEndIndex);
                        if (!success) return false;
                    }

                    i = blockEndIndex + 1;
                    continue;
                }

                // PRÜFUNG: Ist es ein /if-Befehl?
                if (line.startsWith('/if')) {
                    let executedBranch = false;
                    let currentIdx = i;

                    while (currentIdx < endLine) {
                        const curLine = lines[currentIdx].trim();

                        const ifMatch = curLine.match(/^(\/if|ifelse)\s*\((.*?)\)\s*:\s*\{?$/);
                        const elseMatch = curLine.match(/^else\s*:\s*\{?$/);

                        if (!ifMatch && !elseMatch) {
                            break;
                        }

                        let blockEndIndex = findClosingBracket(lines, currentIdx);
                        if (blockEndIndex === -1) {
                            logToConsole(`SyntaxFehler (Zeile ${currentIdx + 1}): Fehlende schliessende Klammer '}' für Block.`, true);
                            return false;
                        }

                        if (ifMatch) {
                            const conditionStr = resolveVariablesInString(ifMatch[2].trim(), currentIdx + 1);

                            if (!executedBranch) {
                                const conditionResult = evaluateCondition(conditionStr, currentIdx + 1);
                                if (conditionResult === null) return false;

                                if (conditionResult === true) {
                                    const success = executeBlock(lines, currentIdx + 1, blockEndIndex);
                                    if (!success) return false;
                                    executedBranch = true;
                                }
                            }
                        } else if (elseMatch) {
                            if (!executedBranch) {
                                const success = executeBlock(lines, currentIdx + 1, blockEndIndex);
                                if (!success) return false;
                                executedBranch = true;
                            }
                        }

                        currentIdx = blockEndIndex + 1;
                        while (currentIdx < endLine && lines[currentIdx].trim() === '') {
                            currentIdx++;
                        }

                        if (currentIdx >= endLine) break;

                        const nextLine = lines[currentIdx].trim();
                        if (!nextLine.startsWith('ifelse') && !nextLine.startsWith('else')) {
                            break;
                        }
                    }

                    i = currentIdx;
                    continue;
                }

                // Schließende Klammern isoliert überspringen
                if (line === '}') {
                    i++;
                    continue;
                }

                // Syntax-Prüfung: Alle anderen Befehle MÜSSEN mit '/' beginnen
                if (!line.startsWith('/')) {
                    logToConsole(`SyntaxFehler (Zeile ${lineNum}): Befehl muss mit '/' beginnen: "${line}"`, true);
                    return false;
                }

                // Einzelnen Befehl verarbeiten
                const success = executeCommand(line, lineNum);
                if (!success) return false;

                i++;
            }
            return true;
        }

        function findClosingBracket(lines, startIdx) {
            let openBrackets = 0;
            for (let j = startIdx; j < lines.length; j++) {
                if (lines[j].includes('{')) openBrackets++;
                if (lines[j].includes('}')) {
                    openBrackets--;
                    if (openBrackets === 0) {
                        return j;
                    }
                }
            }
            return -1;
        }

        function evaluateCondition(cond, lineNum) {
            const opMatch = cond.match(/(<=|>=|!=|=|>=|<=|>|<)/);

            if (opMatch) {
                const operator = opMatch[1];
                const parts = cond.split(operator);
                const leftVal = parseOperand(parts[0].trim(), lineNum);
                const rightVal = parseOperand(parts[1].trim(), lineNum);

                if (leftVal === null || rightVal === null) return null;

                switch (operator) {
                    case '=':  return leftVal === rightVal;
                    case '!=': return leftVal !== rightVal;
                    case '>':  return leftVal > rightVal;
                    case '<':  return leftVal < rightVal;
                    case '>=': return leftVal >= rightVal;
                    case '<=': return leftVal <= rightVal;
                }
            } else {
                const val = parseOperand(cond, lineNum);
                if (val === null) return null;
                return Boolean(val);
            }
        }

        function parseOperand(token, lineNum) {
            if (token.startsWith('?') || token.startsWith('@') || token.startsWith('$')) {
                if (variables.hasOwnProperty(token)) {
                    return variables[token];
                } else {
                    logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable ${token} ist nicht definiert.`, true);
                    return null;
                }
            }
            if (!isNaN(Number(token))) {
                return Number(token);
            }
            const strMatch = token.match(/^["'](.*)["']$/);
            if (strMatch) {
                return strMatch[1];
            }
            if (token === 'true') return true;
            if (token === 'false') return false;

            // Rohe Strings/Farbcodes direkt zurückgeben
            return token;
        }

        function executeCommand(line, lineNum) {
            // 1. Zuweisung & Modifikation von Variablen: =, +=, -=, *=, /=
            const opMatch = line.match(/^\/([$@?])([a-zA-Z0-9_]+)\s*(\+=|-=|\*=|\/=|=)\s*(.+)$/);

            if (opMatch) {
                const typeSymbol = opMatch[1];
                const varName = opMatch[2];
                const operator = opMatch[3];
                let rawValue = opMatch[4].trim();
                const fullVarKey = typeSymbol + varName;

                rawValue = resolveVariablesInString(rawValue, lineNum);

                if (operator !== '=' && !variables.hasOwnProperty(fullVarKey)) {
                    logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Variable ${fullVarKey} existiert nicht und kann nicht verändert werden.`, true);
                    return false;
                }

                if (typeSymbol === '@') {
                    let operandValue = parseOperand(rawValue, lineNum);
                    if (operandValue === null || isNaN(Number(operandValue))) {
                        logToConsole(`TypFehler (Zeile ${lineNum}): Ungültige Zahl für Operation mit @${varName}: "${rawValue}"`, true);
                        return false;
                    }
                    operandValue = Number(operandValue);

                    if (operator === '=') {
                        variables[fullVarKey] = operandValue;
                    } else if (operator === '+=') {
                        variables[fullVarKey] += operandValue;
                    } else if (operator === '-=') {
                        variables[fullVarKey] -= operandValue;
                    } else if (operator === '*=') {
                        variables[fullVarKey] *= operandValue;
                    } else if (operator === '/=') {
                        if (operandValue === 0) {
                            logToConsole(`LaufzeitFehler (Zeile ${lineNum}): Division durch Null ist nicht erlaubt.`, true);
                            return false;
                        }
                        variables[fullVarKey] /= operandValue;
